# Try running:
#
# ansible-playbook -i inventory module_2.2.yaml
#
---
- name: Defuse a bomb with an "alarm clock" timer
  hosts: bomb_robot
  vars:
    _bomb_name: "bartholemew_the_strangler"

  # TODO: Turn this into reusable code
  tasks:
    - name: Reset the bomb state
      ansiblebombsquad.defuse.reset_bomb_state:
        bomb_name: "{{ _bomb_name }}"

    - name: Get the state of the bomb
      ansible.builtin.include_role:
        name: ansiblebombsquad.defuse.get_bomb_state
      vars:
        bomb_name: "{{ _bomb_name }}"

    - name: Show the bomb's state
      ansible.builtin.debug:
        var: bomb_state

    - name: Get the timer_type of the bomb as a var
      ansible.builtin.set_fact:
        _timer_type: "{{ bomb_state.state.timer_type }}"

    - name: Ensure that the timer is an alarm_clock
      ansible.builtin.assert:
        that:
          - _timer_type == "alarm clock"

    - name: Ensure an alarm clock bomb is defused
      ansible.builtin.include_role:
        name: defuse_alarm_clock
      vars:
        bomb_name: "{{ _bomb_name }}"

    - name: Get the final state of the bomb
      ansible.builtin.include_role:
        name: ansiblebombsquad.defuse.get_bomb_state
      vars:
        bomb_name: "{{ _bomb_name }}"

    - name: Show the bomb's state
      ansible.builtin.debug:
        var: bomb_state
